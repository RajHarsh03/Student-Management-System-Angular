<div class="dashboard-container">
  <aside class="sidebar">
    <div class="logo-area"><h2>Admin</h2></div>
    <nav class="nav-links">
      <a routerLink="/admin-dashboard">Dashboard</a>
      <a routerLink="/admin/students">Manage Students</a>
      <a routerLink="/admin/notices">Manage Notices</a>
      <a routerLink="/admin/account" class="active-link">Account</a>
    </nav>
  </aside>

  <main class="main-content">
    <header class="top-header">
      <div class="profile-info">
        <button class="btn-logout" (click)="logout()">Logout</button>
      </div>
    </header>

    <div class="page-body">
      <div class="page-title-row">
        <h1>Account Details</h1>
      </div>

      <div class="account-card card">
        <div class="account-row">
          <span class="account-label">Role</span>
          <span class="account-value role-badge">Admin</span>
        </div>
        <div class="account-row">
          <span class="account-label">Username</span>
          <span class="account-value">{{ username }}</span>
        </div>
        <div class="account-row">
          <span class="account-label">Name</span>
          <span class="account-value">{{ name }}</span>
        </div>
        <div class="account-row">
          <span class="account-label">Session</span>
          <span class="account-value">Active</span>
        </div>
      </div>
    </div>
  </main>
</div>
